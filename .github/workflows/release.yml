# Publish to npm with Sigstore provenance (requires this job to run on GitHub-hosted runners).
#
# Before running: bump version in package.json + package-lock.json on the default branch.
# Repository → Settings → Secrets and variables → Actions → NPM_TOKEN (publish-capable token).
name: Release

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag (e.g. beta — install with npm i nimji@<tag>)"
        required: true
        default: beta

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag ${{ inputs.dist_tag }} --access public --provenance
